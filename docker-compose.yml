services:
  db:
    image: postgres:16-alpine
    restart: always
    mem_limit: 512m
    cpus: 1.0
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp123456}  # ⚠️ 生产环境必须通过 .env 设置强密码
      POSTGRES_DB: erp
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - erp-net

  erp:
    build: .
    restart: always
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "0.0.0.0:8090:8090"
    environment:
      DATABASE_URL: postgres://erp:${POSTGRES_PASSWORD:-erp123456}@db:5432/erp
      SECRET_KEY: ${SECRET_KEY:?请在 .env 文件中设置 SECRET_KEY}
      TZ: Asia/Shanghai
    volumes:
      - ./backups:/app/backups
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp-net

networks:
  erp-net:
    driver: bridge

volumes:
  pgdata:

services:
  db:
    image: postgres:16-alpine
    restart: always
    mem_limit: 512m
    cpus: 1.0
    environment:
      POSTGRES_USER: erp
      # .env 文件中必须设置 POSTGRES_PASSWORD，否则容器拒绝启动
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: erp
      TZ: Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - erp-net

  erp:
    build: .
    restart: always
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "0.0.0.0:8090:8090"
    environment:
      DATABASE_URL: postgres://erp:${POSTGRES_PASSWORD:?}@db:5432/erp
      SECRET_KEY: ${SECRET_KEY:?请在 .env 文件中设置 SECRET_KEY}
      TZ: Asia/Shanghai
      API_KEYS_ENCRYPTION_SECRET: ${API_KEYS_ENCRYPTION_SECRET:?请在 .env 文件中设置 API_KEYS_ENCRYPTION_SECRET}
      AI_DB_PASSWORD: ${AI_DB_PASSWORD:-}
    volumes:
      - ./backups:/app/backups
      - ./uploads:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - erp-net

networks:
  erp-net:
    driver: bridge

volumes:
  pgdata:
